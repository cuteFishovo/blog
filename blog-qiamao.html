<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="icon" type="image/jpeg" href="qiamao-avatar.jpg">
    <title>qiamao | Blog</title>
    <meta property="og:title" content="qiamao | Blog">
    <meta property="og:description" content="少上网 多享受生活 生活远比游戏更有趣">
    <meta property="og:image" content="https://blog.pc-tool.cn/qiamao-avatar.jpg">
    <meta property="og:url" content="https://blog.pc-tool.cn/">
    <meta property="og:type" content="website">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, "Microsoft Yahei", "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
        }

        body {
            min-height: 100vh;
            background: url("qiamao-bg.jpg") no-repeat center center fixed;
            background-size: cover;
            color: #eef2ff;
        }

        .mask {
            width: 100%;
            min-height: 100vh;
            background-color: rgba(18, 12, 16, 0.58);
            padding: 40px 20px;
        }

        .blog-container {
            max-width: 880px;
            margin: 0 auto;
            background: rgba(35, 30, 33, 0.30);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 44px 40px;
            border: 1px solid rgba(210, 190, 200, 0.18);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .avatar-box {
            text-align: center;
            margin-bottom: 28px;
        }

        .avatar {
            width: 152px;
            height: 152px;
            border-radius: 50%;
            border: 3px solid rgba(220, 190, 200, 0.35);
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.2);
            object-fit: cover;
            transition: all 0.35s ease;
        }

        .avatar:hover {
            transform: scale(1.02);
            box-shadow: 0 0 26px rgba(200, 170, 180, 0.30);
            border-color: rgba(230, 205, 215, 0.50);
        }

        .nickname {
            font-size: 30px;
            margin-top: 18px;
            color: #eef3ff;
            letter-spacing: 2px;
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .sign {
            font-size: 14px;
            color: #c8bbc0;
            margin-top: 8px;
            letter-spacing: 1.5px;
        }

        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(200, 180, 190, 0.30), transparent);
            margin: 32px 0;
        }

        .intro-title {
            font-size: 22px;
            color: #ede3e6;
            margin: 32px 0 18px;
            border-left: 3px solid rgba(200, 160, 175, 0.55);
            padding-left: 14px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .intro-text {
            line-height: 1.85;
            font-size: 16px;
            color: #eae2e5;
            text-indent: 2em;
            margin-bottom: 14px;
        }

        .tag-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin: 20px 0 10px;
        }

        .tag {
            padding: 6px 18px;
            background: rgba(60, 50, 55, 0.30);
            border: 1px solid rgba(190, 165, 175, 0.30);
            border-radius: 30px;
            font-size: 14px;
            color: #ede3e6;
            transition: all 0.25s;
            letter-spacing: 0.5px;
            backdrop-filter: blur(2px);
        }

        .tag:hover {
            background: rgba(80, 65, 72, 0.38);
            border-color: rgba(200, 175, 185, 0.45);
        }

        .msg-box {
            background: rgba(45, 38, 40, 0.30);
            border-radius: 20px;
            padding: 22px 28px;
            margin: 24px 0 20px;
            border: 1px solid rgba(195, 170, 180, 0.20);
            backdrop-filter: blur(2px);
        }

        .msg-text {
            line-height: 1.85;
            font-size: 15px;
            color: #efe8ea;
            text-align: center;
            letter-spacing: 1px;
            font-style: normal;
            font-weight: 400;
        }

        /* 我的网站 板块样式 - 干净无emoji */
        .site-section {
            margin: 30px 0 22px;
        }

        .site-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 22px;
            margin-top: 14px;
        }

        .site-card {
            background: rgba(45, 38, 40, 0.30);
            border-radius: 20px;
            padding: 18px 20px;
            border: 1px solid rgba(195, 170, 180, 0.22);
            transition: transform 0.25s ease, background 0.25s, box-shadow 0.2s;
            backdrop-filter: blur(2px);
        }

        .site-card:hover {
            background: rgba(65, 52, 58, 0.48);
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            border-color: rgba(200, 175, 185, 0.38);
        }

        .site-card a {
            font-size: 19px;
            font-weight: 500;
            color: #efe8ea;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
            border-bottom: 1px dotted rgba(210, 185, 195, 0.38);
            transition: color 0.2s, border-color 0.2s;
        }

        .site-card a:hover {
            color: white;
            border-bottom-color: #d8c0ca;
        }

        .site-card p {
            font-size: 13.5px;
            line-height: 1.55;
            color: #d8cfd3;
            margin: 0;
            word-break: break-word;
        }

        .footer {
            text-align: center;
            margin-top: 52px;
            font-size: 13px;
            color: #beb3b7;
            padding-top: 24px;
            border-top: 1px solid rgba(190, 175, 180, 0.18);
            letter-spacing: 1px;
        }

        .footer p + p {
            margin-top: 6px;
            font-size: 12px;
        }

        @media (max-width: 640px) {
            .blog-container {
                padding: 28px 22px;
            }
            .avatar {
                width: 115px;
                height: 115px;
            }
            .nickname {
                font-size: 26px;
            }
            .intro-title {
                font-size: 20px;
            }
            .site-grid {
                gap: 16px;
                grid-template-columns: 1fr;
            }
            .site-card {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="mask">
        <div class="blog-container">
            <!-- 头像 & 昵称 & 签名 -->
            <div class="avatar-box">
                <img src="qiamao-avatar.jpg" alt="avatar" class="avatar">
                <h2 class="nickname">qiamao</h2>
            </div>

            <div class="divider"></div>

            <!-- 关于我 -->
            <h3 class="intro-title">关于我</h3>
            <p class="intro-text">
                不在人间。
            </p>
            

            <!-- 兴趣爱好 -->
            <h3 class="intro-title">兴趣爱好</h3>
            <div class="tag-wrap">
                <span class="tag">游戏</span>
                <span class="tag">编程</span>
                <span class="tag">动漫</span>
                <span class="tag">国摇</span>
                <span class="tag">有马加奈</span>
            </div>

            <!-- 座右铭 -->
            <h3 class="intro-title">座右铭</h3>
            <div class="msg-box">
                <p class="msg-text">
                    活着就行别求太多
                </p>
            </div>

            <!-- 我的网站 板块 -->
            <div class="site-section">
                <h3 class="intro-title">我的网站</h3>
                <div class="site-grid">
                    <!-- 卡片 1 -->
                    <div class="site-card">
                        <a href="https://github.com/sb123123ll" target="_blank" rel="noopener">我的GitHub</a>
                        <p>爱写一些小东西</p>
                    </div>
                    <!-- 卡片 2 -->
                    <div class="site-card">
                        <a href="https://space.bilibili.com/651371142" target="_blank" rel="noopener">我的BiliBili</a>
                        <p>分享一些教程和经验</p>
                    </div>
                    <div class="site-card">
                        <a href="https://www.pc-tool.cn/" target="_blank" rel="noopener">工具箱</a>
                        <p>一些在线工具</p>
                    </div>
                    <div class="site-card">
                        <a href="tencent://message/?uin=1348179575&Site=&Menu=yes" rel="noopener">联系QQ</a>
                        <p>QQ: 1348179575</p>
                    </div>
                    <div class="site-card">
                        <a href="./index.html" rel="noopener">cuteFish博客</a>
                        <p>主pc-tool.cn开发</p>
                    </div>
                </div>
            </div>

            <!-- 底部 -->
            <div class="footer">
                <p>© 2026 qiamao blog.pc-tool.cn</p>
            </div>
        </div>
    </div>
</body>
</html>
